name: Build My Angular App

on:
  push:
    branches: [ main ]

jobs:
  build-angular-app:
    runs-on: ubuntu-latest
       
    steps:
       - uses: actions/checkout@v7.0.0
       - name: Setup Node.JS
         uses: actions/setup-node@v6.4.0
         with:
           node-version: 22.x  
       - name: install Dependencies
         run: npm install
       - name: Build Angular App
         run: npm run build  
       
